<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة المريض — Design Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="design-system.css">

  <style>
    /* ── Page Layout ─────────────────────────────────────────── */
    html, body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .scene {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .scene-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }

    /* ── Phone Glow Backdrop ─────────────────────────────────── */
    .phone-wrap {
      position: relative;
    }

    .phone-wrap::before {
      content: '';
      position: absolute;
      inset: 20px;
      background: radial-gradient(ellipse at 50% 60%, rgba(59,130,246,0.12) 0%, transparent 70%);
      filter: blur(40px);
      pointer-events: none;
      z-index: -1;
    }

    /* ── Noise Texture Overlay on Balance Card ───────────────── */
    .noise-overlay {
      position: absolute;
      inset: 0;
      opacity: 0.5;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      border-radius: inherit;
    }

    /* ── Greeting Leaf Icon ──────────────────────────────────── */
    .leaf-icon {
      display: inline-block;
      width: 14px;
      height: 14px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="scene">
  <p class="scene-label">بوابة المريض · UI Preview</p>

  <div class="phone-wrap">
    <!-- ═══════════════ PHONE SHELL ══════════════════ -->
    <div class="phone-shell">

      <!-- Notch -->
      <div class="phone-notch"></div>

      <div class="phone-screen">

        <!-- ── Status Bar ───────────────────────────── -->
        <div class="status-bar rise-in rise-in-1">
          <span class="time">11:58</span>
          <div class="status-icons">
            <!-- Signal bars -->
            <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:white;">
              <rect x="2"  y="14" width="3" height="7" rx="1"/>
              <rect x="7"  y="10" width="3" height="11" rx="1"/>
              <rect x="12" y="6"  width="3" height="15" rx="1"/>
              <rect x="17" y="2"  width="3" height="19" rx="1" opacity="0.4"/>
            </svg>
            <!-- WiFi -->
            <svg viewBox="0 0 24 24" fill="none" style="width:16px;height:16px;" stroke="white" stroke-width="2" stroke-linecap="round">
              <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
              <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
              <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
              <circle cx="12" cy="20" r="1" fill="white"/>
            </svg>
            <!-- Battery -->
            <svg viewBox="0 0 24 24" fill="none" style="width:20px;height:16px;" stroke="white" stroke-width="1.8" stroke-linecap="round">
              <rect x="1" y="6" width="18" height="12" rx="2"/>
              <path d="M19 10v4" stroke-width="2.5"/>
              <rect x="3" y="8" width="12" height="8" rx="1" fill="white"/>
            </svg>
          </div>
        </div>

        <!-- ── Scrollable Content ───────────────────── -->
        <div class="phone-content">

          <!-- Header -->
          <div class="header rise-in rise-in-2">
            <div class="user-block">
              <div class="avatar">ف</div>
              <div class="user-text">
                <div class="greeting">
                  مرحباً بك
                  <!-- Leaf SVG -->
                  <svg class="leaf-icon" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z"/>
                    <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/>
                  </svg>
                </div>
                <div class="username">فتحي محمد القزيزي</div>
              </div>
            </div>
            <button class="icon-btn" title="تسجيل الخروج">
              <svg viewBox="0 0 24 24">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </button>
          </div>

          <!-- Balance Card -->
          <div class="balance-card rise-in rise-in-3">
            <!-- Shimmer sweep -->
            <div class="card-shimmer"></div>
            <!-- Noise overlay -->
            <div class="noise-overlay"></div>

            <!-- Top row -->
            <div class="card-top">
              <div class="card-chip">
                <svg viewBox="0 0 24 24">
                  <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                  <line x1="1" y1="10" x2="23" y2="10"/>
                </svg>
                <span>إجمالي المصروفات للعائلة</span>
              </div>
              <div class="card-dots">
                <svg viewBox="0 0 24 24">
                  <rect x="3"  y="3"  width="7" height="7" rx="1"/>
                  <rect x="14" y="3"  width="7" height="7" rx="1"/>
                  <rect x="14" y="14" width="7" height="7" rx="1"/>
                  <rect x="3"  y="14" width="7" height="7" rx="1"/>
                </svg>
              </div>
            </div>

            <!-- Amount -->
            <div class="card-amount">
              <span class="currency">د.ل</span>
              <span class="value">24,726</span>
              <span class="decimals">.89</span>
            </div>

            <!-- Bottom row -->
            <div class="card-bottom">
              <span class="card-sub">يشمل الموظف والتابعين</span>
              <div class="card-pill">
                <svg viewBox="0 0 24 24">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span>6 تابعين</span>
              </div>
            </div>
          </div>

          <!-- Section Title -->
          <p class="section-title rise-in rise-in-4">الخدمات الرئيسية</p>

          <!-- Service Grid -->
          <div class="service-grid">

            <!-- أفراد العائلة -->
            <div class="grid-item blue rise-in rise-in-g1">
              <svg viewBox="0 0 24 24">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              <span>أفراد العائلة</span>
            </div>

            <!-- السقف العلاجي -->
            <div class="grid-item emerald rise-in rise-in-g2">
              <svg viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
              <span>السقف العلاجي</span>
            </div>

            <!-- سجل الفواتير -->
            <div class="grid-item teal rise-in rise-in-g3">
              <svg viewBox="0 0 24 24">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <line x1="10" y1="9"  x2="8" y2="9"/>
              </svg>
              <span>سجل الفواتير</span>
            </div>

            <!-- سقف المؤمن -->
            <div class="grid-item violet rise-in rise-in-g4">
              <svg viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
              <span>سقف المؤمن</span>
            </div>

            <!-- مزودي الخدمة -->
            <div class="grid-item rose rise-in rise-in-g5">
              <svg viewBox="0 0 24 24">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
              </svg>
              <span>مزودي الخدمة</span>
            </div>

            <!-- خدمات -->
            <div class="grid-item slate rise-in rise-in-g6">
              <svg viewBox="0 0 24 24">
                <rect x="3"  y="3"  width="7" height="7" rx="1.5"/>
                <rect x="14" y="3"  width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
                <rect x="3"  y="14" width="7" height="7" rx="1.5"/>
              </svg>
              <span>خدمات</span>
            </div>

          </div><!-- /service-grid -->

          <!-- CTA Button -->
          <button class="cta-btn rise-in rise-in-5">
            <svg viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            فتح تذكرة جديدة
          </button>

        </div><!-- /phone-content -->
      </div><!-- /phone-screen -->
    </div><!-- /phone-shell -->
  </div><!-- /phone-wrap -->

  <p class="scene-label">© بوابة المريض · تصميم احترافي</p>
</div><!-- /scene -->

</body>
</html>
